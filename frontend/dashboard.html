<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSMS - Core Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-[#0b0f19] text-slate-100 min-h-screen font-sans cyber-grid antialiased">

    <nav class="glass-panel border-b border-slate-800/80 sticky top-0 z-50 px-6 py-4 shadow-2xl flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="h-3 w-3 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_10px_#10b981]"></div>
            <div>
                <h1 class="text-xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 uppercase">⚡ CSMS Intelligence</h1>
                <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Neon Relational Data Engine</p>
            </div>
        </div>
        <a href="index.html" class="text-xs font-mono border border-slate-700 hover:border-indigo-500 bg-slate-900/50 px-4 py-2 rounded-xl transition">&larr; PORTAL ESCAPE</a>
    </nav>

    <main class="container mx-auto my-10 px-4 max-w-7xl grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="glass-panel p-6 rounded-3xl relative overflow-hidden neon-glow-indigo">
            <h2 class="text-sm font-mono font-bold text-slate-300 uppercase mb-4 border-b border-slate-800 pb-2">💰 Financial Ingestion Matrix (STUDENT_INVOICES)</h2>
            <div class="relative h-80 w-full"><canvas id="feeStatusChart"></canvas></div>
        </div>

        <div class="glass-panel p-6 rounded-3xl relative overflow-hidden neon-glow-indigo">
            <h2 class="text-sm font-mono font-bold text-slate-300 uppercase mb-4 border-b border-slate-800 pb-2">📊 Structural Density Map (ENROLLMENTS)</h2>
            <div class="relative h-80 w-full"><canvas id="studentDensityChart"></canvas></div>
        </div>
    </main>

    <script src="assets/js/dashboard.js"></script>
</body>
</html>
