<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSMS - Ledger Influx</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-[#0b0f19] text-slate-100 min-h-screen font-sans cyber-grid flex flex-col justify-between">

    <nav class="glass-panel border-b border-slate-800/80 px-6 py-4 flex justify-between items-center">
        <h1 class="text-lg font-black tracking-widest text-cyan-400 uppercase">💰 Billing Account System</h1>
        <a href="index.html" class="text-xs font-mono border border-slate-700 hover:border-indigo-500 bg-slate-900/50 px-4 py-2 rounded-xl transition">&larr; ESCAPE</a>
    </nav>

    <main class="container mx-auto my-auto px-4 py-12 max-w-2xl">
        <div class="glass-panel p-8 rounded-3xl neon-glow-cyan">
            <div class="mb-6 border-b border-slate-800 pb-3">
                <h2 class="text-base font-bold text-slate-200 uppercase">📝 Issue Dynamic Fee Invoice Document</h2>
                <p class="text-[10px] font-mono text-slate-500 mt-0.5">TARGET DATA KEY: PUBLIC.STUDENT_INVOICES</p>
            </div>
            
            <form id="feeGenerationForm" class="space-y-5">
                <input type="number" id="refStudentId" required placeholder="Student DB Relational ID (FK)" class="w-full bg-slate-900/40 border border-slate-800 focus:border-cyan-500 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none">
                <input type="number" step="0.01" id="invoiceAmount" required placeholder="Invoice Gross Amount (PKR)" class="w-full bg-slate-900/40 border border-slate-800 focus:border-cyan-500 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none">
                <input type="date" id="dueDate" required class="w-full bg-slate-900/40 border border-slate-800 focus:border-cyan-500 rounded-xl px-4 py-3 text-sm text-slate-400 focus:outline-none">
                
                <select id="paymentStatus" required class="w-full bg-slate-900/60 border border-slate-800 focus:border-cyan-500 rounded-xl px-4 py-3 text-sm text-slate-300 focus:outline-none cursor-pointer">
                    <option value="Unpaid">Unpaid (Pending Queue)</option>
                    <option value="Paid">Paid (Transaction Cleared)</option>
                    <option value="Partially Paid">Partially Paid</option>
                </select>

                <button type="submit" class="w-full bg-gradient-to-r from-cyan-600 to-cyan-400 text-white font-mono font-bold text-xs tracking-widest py-4 rounded-xl transition duration-500 uppercase cursor-pointer">🚀 Process Transaction Influx</button>
            </form>
            <div id="feeFeedback" class="hidden mt-4 p-3 rounded-xl text-center text-xs font-mono"></div>
        </div>
    </main>

    <script src="assets/js/fee.js"></script>
</body>
</html>
