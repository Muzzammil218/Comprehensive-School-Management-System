<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Manage Students</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TailwindCSS for cyberpunk styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/global.css">
</head>

<body class="bg-black text-cyan-300 font-mono">
  <!-- Include nav -->
  <%- include('../components/nav') %>
    <!-- Header -->
    <header class="p-4 bg-gray-900 border-b border-cyan-400 flex justify-between items-center">
      <h1 class="text-2xl neon-text">👨‍🎓 Student Management</h1>
      <a href="dashboard.html" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-700 rounded">Back to Dashboard</a>
    </header>

    <!-- Student Form -->
    <section class="p-6">
      <h2 class="text-xl mb-4">Add New Student</h2>
      <form id="studentForm" class="space-y-4 bg-gray-800 p-4 rounded shadow-neon">
        <input id="studentName" type="text" placeholder="Student Name"
          class="w-full p-2 rounded bg-black border border-cyan-400 text-cyan-300" required>
        <input id="studentAge" type="number" placeholder="Age"
          class="w-full p-2 rounded bg-black border border-cyan-400 text-cyan-300" required>
        <input id="studentClass" type="text" placeholder="Class ID"
          class="w-full p-2 rounded bg-black border border-cyan-400 text-cyan-300" required>
        <button type="submit" class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded">Add Student</button>
      </form>
    </section>

    <!-- Student Table -->
    <section class="p-6">
      <h2 class="text-xl mb-4">Student Records</h2>
      <table class="w-full border border-cyan-400 text-cyan-300">
        <thead class="bg-gray-900">
          <tr>
            <th class="p-2 border border-cyan-400">ID</th>
            <th class="p-2 border border-cyan-400">Name</th>
            <th class="p-2 border border-cyan-400">Age</th>
            <th class="p-2 border border-cyan-400">Class ID</th>
            <th class="p-2 border border-cyan-400">Actions</th>
          </tr>
        </thead>
        <tbody id="studentTable" class="bg-gray-800">
          <!-- Rows injected by students.js -->
        </tbody>
      </table>
    </section>

    <!-- Scripts -->
    <script type="module" src="../assets/js/students.js"></script>
    <!-- Include footer -->
    <%- include('../components/footer') %>
</body>

</html>
