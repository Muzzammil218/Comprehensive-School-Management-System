<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSMS - Intelligence Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body class="cyber-grid min-h-screen text-slate-100 font-sans">

  <nav class="glass-panel px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 uppercase">
      ⚡ CSMS Intelligence Dashboard
    </h1>
    <a href="index.html" class="text-xs font-mono border border-slate-700 hover:border-indigo-500 bg-slate-900/50 px-4 py-2 rounded-xl transition">&larr; Portal Escape</a>
  </nav>

  <main class="container mx-auto my-10 px-4 max-w-7xl grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-8">
    <div class="glass-panel p-6 rounded-3xl neon-glow-indigo">
      <h2 class="panel-title">💰 Finance Matrix</h2>
      <canvas id="feeStatusChart"></canvas>
    </div>

    <div class="glass-panel p-6 rounded-3xl neon-glow-indigo">
      <h2 class="panel-title">📊 Enrollment Density</h2>
      <canvas id="studentDensityChart"></canvas>
    </div>

    <div class="glass-panel p-6 rounded-3xl neon-glow-emerald">
      <h2 class="panel-title">👩‍🏫 Teacher Distribution</h2>
      <canvas id="teacherChart"></canvas>
    </div>

    <div class="glass-panel p-6 rounded-3xl neon-glow-cyan">
      <h2 class="panel-title">📅 Attendance Stats</h2>
      <canvas id="attendanceChart"></canvas>
    </div>

    <div class="glass-panel p-6 rounded-3xl neon-glow-indigo">
      <h2 class="panel-title">📖 Grades Overview</h2>
      <canvas id="gradesChart"></canvas>
    </div>
  </main>

  <script src="../assets/js/dashboard.js"></script>
</body>
</html>
