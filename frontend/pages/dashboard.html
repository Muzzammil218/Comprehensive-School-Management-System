<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link rel="stylesheet" href="assets/css/global.css" />
</head>
<body class="bg-black text-white font-sans">

  <!-- Header -->
  <header class="p-6 bg-gradient-to-r from-purple-800 via-pink-600 to-cyan-500 shadow-lg">
    <h1 class="text-3xl font-bold neon-text">⚡ Cyberpunk School Dashboard ⚡</h1>
    <p class="text-sm opacity-80">Realtime analytics powered by Socket.IO</p>
  </header>

  <!-- Grid Layout -->
  <main class="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    
    <!-- Finance -->
    <section class="bg-gray-900 p-6 rounded-lg shadow-lg neon-border">
      <h2 class="text-xl font-semibold mb-4">Finance Status</h2>
      <canvas id="feeStatusChart"></canvas>
    </section>

    <!-- Students -->
    <section class="bg-gray-900 p-6 rounded-lg shadow-lg neon-border">
      <h2 class="text-xl font-semibold mb-4">Students per Class</h2>
      <canvas id="studentDensityChart"></canvas>
    </section>

    <!-- Teachers -->
    <section class="bg-gray-900 p-6 rounded-lg shadow-lg neon-border">
      <h2 class="text-xl font-semibold mb-4">Teachers by Subject</h2>
      <canvas id="teacherChart"></canvas>
    </section>

    <!-- Attendance -->
    <section class="bg-gray-900 p-6 rounded-lg shadow-lg neon-border md:col-span-2">
      <h2 class="text-xl font-semibold mb-4">Attendance (Last 7 Days)</h2>
      <canvas id="attendanceChart"></canvas>
    </section>

    <!-- Grades -->
    <section class="bg-gray-900 p-6 rounded-lg shadow-lg neon-border md:col-span-3">
      <h2 class="text-xl font-semibold mb-4">Average Grades per Subject</h2>
      <canvas id="gradesChart"></canvas>
    </section>

  </main>

  <!-- JS -->
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
