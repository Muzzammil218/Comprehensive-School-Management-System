<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Admin Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TailwindCSS for cyberpunk styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/global.css">
</head>

<body class="bg-black text-cyan-300 font-mono flex items-center justify-center h-screen">
  <!-- Include nav -->
  <%- include('../components/nav') %>
    <!-- Registration Card -->
    <div class="bg-gray-900 p-8 rounded shadow-neon w-full max-w-md">
      <h1 class="text-2xl mb-6 neon-text text-center">📝 Admin Registration</h1>
      <form id="registerForm" class="space-y-4">
        <input id="regUsername" type="text" placeholder="Username"
          class="w-full p-2 rounded bg-black border border-cyan-400 text-cyan-300" required>
        <input id="regPassword" type="password" placeholder="Password"
          class="w-full p-2 rounded bg-black border border-cyan-400 text-cyan-300" required>
        <button type="submit" class="w-full px-4 py-2 bg-green-600 hover:bg-green-700 rounded">Register</button>
      </form>

      <!-- Login Link -->
      <p class="mt-4 text-center">
        Already have an account?
        <a href="login.html" class="text-cyan-400 hover:text-cyan-200">Login here</a>
      </p>
    </div>

    <!-- Scripts -->
    <script type="module" src="../assets/js/auth.js"></script>
    <!-- Include footer -->
    <%- include('../components/footer') %>
</body>

</html>
